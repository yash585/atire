<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atire — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#111111;
    --paper:#ffffff;
    --gold:#b9a06a;
    --gray:#8a8a8a;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    height:100%;
    background:var(--paper);
    color:var(--ink);
    font-family:'Jost', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:6vh 6vw;
    text-align:center;
    position:relative;
    overflow-x:hidden;
  }

  /* corner marks — quiet structural device, echoes a garment tag/label */
  .mark{
    position:fixed;
    display:flex;
    flex-direction:column;
    gap:6px;
    font-family:'Jost', sans-serif;
    font-size:11px;
    letter-spacing:0.16em;
    color:var(--gray);
    text-transform:uppercase;
    line-height:1.5;
  }
  .mark.tl{ top:5vh; left:6vw; }
  .mark.tr{ top:5vh; right:6vw; text-align:right; align-items:flex-end; }
  .mark.bl{ bottom:5vh; left:6vw; }
  .mark.br{ bottom:5vh; right:6vw; text-align:right; align-items:flex-end; }

  .mark.brandmark{
    font-family:'Bodoni Moda', serif;
    font-size:14px;
    letter-spacing:0.1em;
    color:var(--ink);
  }

  .mark a{
    color:var(--gray);
    text-decoration:none;
    border-bottom:1px solid rgba(138,138,138,0.4);
    padding-bottom:1px;
    transition:color 0.25s ease, border-color 0.25s ease;
  }
  .mark a:hover{
    color:var(--ink);
    border-color:var(--gold);
  }

  @media (max-width:640px){
    .mark{ font-size:9.5px; letter-spacing:0.12em; }
    .mark.tl{ top:3vh; left:5vw; }
    .mark.tr{ top:3vh; right:5vw; }
    .mark.bl{ bottom:3vh; left:5vw; }
    .mark.br{ bottom:3vh; right:5vw; }
    .mark.brandmark{ font-size:12px; }
  }

  .wordmark-wrap{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    max-width:900px;
  }

  .rule{
    flex:1;
    height:0;
    border-top:3px dashed rgba(17,17,17,0.55);
  }

  .wordmark{
    font-family:'Bodoni Moda', serif;
    font-optical-sizing:auto;
    font-weight:400;
    font-size:clamp(4.2rem, 17vw, 11rem);
    letter-spacing:0.02em;
    line-height:1;
    color:var(--ink);
    padding:0 clamp(0.6rem, 3vw, 2.2rem);
    white-space:nowrap;
  }

  .eyebrow{
    font-size:clamp(0.62rem, 1.1vw, 0.72rem);
    letter-spacing:0.5em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:clamp(1.2rem, 3vh, 1.8rem);
    font-weight:400;
  }

  .wordmark .i{
    font-style:italic;
    font-weight:400;
  }

  .tagline{
    margin-top:clamp(1.6rem, 4vh, 2.6rem);
    font-size:clamp(0.7rem, 1.4vw, 0.82rem);
    letter-spacing:0.42em;
    text-transform:uppercase;
    color:var(--ink);
    font-weight:400;
  }

  .divider-double{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin:clamp(1.8rem, 4.5vh, 2.6rem) 0;
  }
  .divider-double span:not(.diamond){
    width:46px;
    height:1px;
    background:rgba(17,17,17,0.3);
  }
  .divider-double .diamond{
    width:6px;
    height:6px;
    background:var(--gold);
    transform:rotate(45deg);
  }

  .note{
    max-width:480px;
    font-size:clamp(0.88rem, 1.6vw, 1rem);
    line-height:1.8;
    color:#4a4a4a;
    font-weight:300;
  }

  @media (prefers-reduced-motion: no-preference){
    .eyebrow, .wordmark-wrap, .tagline, .divider-double, .note{
      animation:rise 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }
    .eyebrow{ animation-delay:0s; }
    .wordmark-wrap{ animation-delay:0.1s; }
    .tagline{ animation-delay:0.3s; }
    .divider-double{ animation-delay:0.4s; }
    .note{ animation-delay:0.5s; }

    @keyframes rise{
      from{ opacity:0; transform:translateY(14px); }
      to{ opacity:1; transform:translateY(0); }
    }
  }

  a:focus-visible, button:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:3px;
  }
</style>
</head>
<body>

  <div class="mark tl brandmark">Atire</div>

  <div class="mark tr">
    <span>Est. 2026</span>
    <span>Maharashtra, IN</span>
  </div>

  <div class="mark bl">
    <a href="https://atire.shop">atire.shop</a>
  </div>

  <p class="eyebrow">Introducing</p>

  <div class="wordmark-wrap">
    <span class="rule"></span>
    <h1 class="wordmark">AT<span class="i">i</span>RE</h1>
    <span class="rule"></span>
  </div>

  <p class="tagline">Coming Soon</p>

  <div class="divider-double" aria-hidden="true">
    <span></span>
    <span class="diamond"></span>
    <span></span>
  </div>

  <p class="note">A clothing label under construction. Every piece measured twice, cut once. First drop lands soon.</p>

</body>
</html>
